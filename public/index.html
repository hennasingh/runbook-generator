<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runbook Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚨 Runbook Generator</h1>
            <p>Describe your problem, get a structured runbook instantly</p>
        </header>

        <main>
            <form id="problemForm">
                <div class="form-group">
                    <label for="problemInput">Problem Description:</label>
                    <textarea 
                        id="problemInput" 
                        rows="6" 
                        placeholder="Describe the issue you're experiencing..." 
                        required></textarea>
                </div>
                <button type="submit" id="generateBtn">Generate Runbook</button>
            </form>

            <div id="result" class="result-container hidden">
                <div id="resultContent"></div>
                <button id="saveBtn" class="save-btn hidden">Save Runbook</button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Generating runbook...</p>
            </div>

            <div id="error" class="error hidden"></div>

            <!-- Browse & Search Section -->
            <section id="browseSection" class="browse-section">
                <div class="browse-header">
                    <h2>📚 Browse & Search Runbooks</h2>
                    <div class="search-bar">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Search runbooks by title..." 
                            class="search-input">
                        <button id="searchBtn" class="search-btn">Search</button>
                        <button id="clearSearchBtn" class="clear-search-btn hidden">Clear Search</button>
                    </div>
                </div>

                <div id="browseLoading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Loading runbooks...</p>
                </div>

                <div id="browseError" class="error hidden"></div>

                <div id="browseResults" class="browse-results">
                    <!-- Cards will be inserted here -->
                </div>

                <div id="browsePagination" class="pagination hidden">
                    <button id="prevBtn" class="pagination-btn" disabled>← Previous</button>
                    <span id="pageInfo" class="page-info">Page 1</span>
                    <button id="nextBtn" class="pagination-btn" disabled>Next →</button>
                </div>

                <div id="noResults" class="no-results hidden">
                    📭 No runbooks found
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
